<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" href="style.css">

    <style>

        h2{
            color:aqua;
            text-decoration: underline wavy rgb(0, 136, 255);
        }

         .text{
            color:rgb(255, 0, 208);
            border: 1px underline wavy rgb(0, 255, 85);

        }
        #mytext{
            background-color: bisque;
            font-weight: 300;
        }

         h3{
            color:aquamarine !important;

         }

        .myclass{
            color:brown;
        }
        
        #myid{
            color:bisque;
        }
      </style>
</head>
<body>

    <h1 style="color:rgb(226, 43, 202);font-size:60px; ">Inline CSSS is used to style individual tag only</h1>

    <h2>Internal css is used tostyle multiple tags at once </h2>

    <h2 class="text" >name selector is used to select elements by their tag name </h2>

    <p class="text"  >class selector is used to select elementsby their class name</p>

    <p id="mytext"> id selector is udsed to select elements by their id name </p>

    <h3 class="myclass" id="myid" style="color:cornflowerblue;">selector priority</h3>
    
    <button class="btn">submit</button>

</body>
</html>
